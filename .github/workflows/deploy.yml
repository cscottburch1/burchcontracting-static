name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Only one deploy runs at a time. cancel-in-progress is deliberately false:
# cancelling an FTP upload mid-flight is how the server ended up in a mixed
# version state before (stale sync-state file, partially-uploaded files).
# A newly pushed commit queues behind the active run instead of killing it.
concurrency:
  group: deploy-hostinger
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: burchcontracting-dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: burchcontracting-dev/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # BUILD_ENV=production is what activates flip-noindex-production.mjs
      # (see package.json's "build" script) — no-op otherwise, so this is
      # safe to pass unconditionally. Same condition as the guard step below.
      - name: Build project
        env:
          BUILD_ENV: ${{ vars.STAGING_URL == 'https://burchcontracting.com' && 'production' || '' }}
        run: npm run build

      # Fails the workflow (not just a warning) on: &amp;amp; double-encoding,
      # any sitemap URL with zero inbound internal links, or (only once
      # cutover has happened — see BUILD_ENV below) noindex still present
      # anywhere except 404.html. Runs on the regenerated source files from
      # the build step above, not dist/, and before the FTP deploy step so a
      # failure blocks the deploy.
      #
      # BUILD_ENV is only set to "production" once STAGING_URL has been
      # pointed at the real burchcontracting.com (LAUNCH-CHECKLIST.md #7,
      # done at cutover) — deliberately NOT unconditional. This workflow
      # currently deploys to nicheprohub.com on every push to main, and
      # every one of those 39 pages intentionally carries noindex pre-launch
      # (see LAUNCH-CHECKLIST.md #1). Setting BUILD_ENV=production
      # unconditionally right now would fail the noindex check on every
      # single push starting today and block all further staging deploys
      # until someone manually flips noindex early — the opposite of the
      # intent. This condition makes the guard activate automatically at
      # the same moment cutover happens, with no separate step to remember.
      - name: Build guard (check-build)
        env:
          BUILD_ENV: ${{ vars.STAGING_URL == 'https://burchcontracting.com' && 'production' || '' }}
        run: npm run check-build

      - name: Stamp build version
        run: |
          echo "commit=${GITHUB_SHA}" > dist/version.txt
          echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> dist/version.txt

      - name: Normalize FTP connection settings
        id: ftp
        env:
          RAW_SERVER: ${{ secrets.DEPLOY_HOST || secrets.FTP_SERVER }}
        run: |
          server="${RAW_SERVER#"${RAW_SERVER%%[![:space:]]*}"}"
          server="${server%"${server##*[![:space:]]}"}"
          protocol=ftp
          port=21

          case "$server" in
            ftps://*)
              protocol=ftps
              server="${server#ftps://}"
              ;;
            ftp://*)
              server="${server#ftp://}"
              ;;
          esac

          server="${server%%/*}"
          if [[ "$server" == *:* ]]; then
            host="${server%%:*}"
            maybe_port="${server##*:}"
            if [[ "$maybe_port" =~ ^[0-9]+$ ]]; then
              server="$host"
              port="$maybe_port"
            fi
          fi

          if [ -z "$server" ]; then
            echo "::error::FTP server is empty. Set DEPLOY_HOST or FTP_SERVER."
            exit 1
          fi

          echo "server=$server" >> "$GITHUB_OUTPUT"
          echo "protocol=$protocol" >> "$GITHUB_OUTPUT"
          echo "port=$port" >> "$GITHUB_OUTPUT"

      # Recovery procedure: if the live site is ever stale while runs are
      # green, the FTP action's incremental sync-state file
      # (.ftp-deploy-sync-state.json, in the server-dir root) has likely
      # gotten ahead of what's actually on the server. Delete that file via
      # Hostinger File Manager, then re-run this workflow — with no state
      # file present, the action does a full re-upload of every file.
      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ steps.ftp.outputs.server }}
          username: ${{ secrets.DEPLOY_USERNAME || secrets.FTP_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD || secrets.FTP_PASSWORD }}
          port: ${{ steps.ftp.outputs.port }}
          protocol: ${{ steps.ftp.outputs.protocol }}
          local-dir: ./burchcontracting-dev/dist/
          server-dir: ./
          dangerous-clean-slate: false
          log-level: verbose
          timeout: 600000
          exclude: |
            **/api/config.local.php

      - name: Verify deployment
        env:
          SITE_URL: ${{ vars.STAGING_URL || 'https://nicheprohub.com' }}
        run: |
          sleep 10
          live=$(curl -fsSL --retry 3 "$SITE_URL/version.txt?nocache=$GITHUB_RUN_ID" | grep '^commit=' | cut -d= -f2)
          echo "Live commit:     $live"
          echo "Expected commit: $GITHUB_SHA"
          if [ "$live" != "$GITHUB_SHA" ]; then
            echo "::error::Deployed version marker does not match this commit — the FTP sync likely skipped files. Delete .ftp-deploy-sync-state.json on the server and re-run."
            exit 1
          fi
          curl -fsSL "$SITE_URL/privacy-policy.html?nocache=$GITHUB_RUN_ID" -o /dev/null || { echo "::error::privacy-policy.html not reachable"; exit 1; }

          # Content-integrity check across every built page. version.txt above
          # only proves ONE freshly-generated file uploaded — it says nothing
          # about the rest, since the FTP action's incremental sync can skip
          # files its (possibly stale) state file thinks are unchanged. That
          # exact gap once left outdoor-living/decks silently stale while this
          # step stayed green. Compare a hash of every dist/*.html file against
          # what's actually live instead of one hardcoded known-bad string on
          # one page.
          # api/ is backend PHP territory, not public pages — some paths under
          # it (e.g. email-templates/) are deliberately blocked via .htaccess
          # and correctly return 403/empty, which would never hash-match the
          # built HTML. Only compare pages meant to be served as-is.
          mismatch=0
          while IFS= read -r -d '' file; do
            rel="${file#dist/}"
            case "$rel" in
              api/*) continue ;;
            esac
            if [ "$rel" = "index.html" ]; then
              url_path="/"
            elif [ "${rel%/index.html}" != "$rel" ]; then
              url_path="/${rel%/index.html}/"
            else
              url_path="/$rel"
            fi
            local_hash=$(sha256sum "$file" | cut -d' ' -f1)
            live_hash=$(curl -fsSL "$SITE_URL$url_path?nocache=$GITHUB_RUN_ID" | sha256sum | cut -d' ' -f1)
            if [ "$local_hash" != "$live_hash" ]; then
              echo "::error::Content mismatch on $url_path — built hash $local_hash, live hash $live_hash. FTP sync likely skipped this file; delete .ftp-deploy-sync-state.json on the server and re-run."
              mismatch=1
            fi
          done < <(find dist -name '*.html' -print0)
          if [ "$mismatch" = "1" ]; then
            exit 1
          fi
          echo "Content-integrity check passed: every built page matches live."

          # reCAPTCHA site key is read from this data attribute at runtime (see
          # src/js/main.js) — confirm the live page matches what's actually in
          # the repo at this commit, not a stale or hand-edited copy.
          expected_key=$(grep -o 'data-recaptcha-site-key="[^"]*"' contact.html | head -1)
          live_key=$(curl -fsSL "$SITE_URL/contact.html?nocache=$GITHUB_RUN_ID" | grep -o 'data-recaptcha-site-key="[^"]*"' | head -1)
          echo "Expected recaptcha key attr: $expected_key"
          echo "Live recaptcha key attr:     $live_key"
          if [ -z "$live_key" ] || [ "$live_key" != "$expected_key" ]; then
            echo "::error::Live data-recaptcha-site-key does not match contact.html in this commit — contact form will fail reCAPTCHA."
            exit 1
          fi

          # /api/contact.php should reject GET (405) but exist; config.local.php
          # must never be served (403), or the reCAPTCHA/SMTP secrets leak.
          contact_status=$(curl -s -o /dev/null -w '%{http_code}' "$SITE_URL/api/contact.php")
          echo "contact.php status: $contact_status"
          if [ "$contact_status" != "405" ]; then
            echo "::error::api/contact.php returned $contact_status, expected 405"
            exit 1
          fi

          config_status=$(curl -s -o /dev/null -w '%{http_code}' "$SITE_URL/api/config.local.php")
          echo "config.local.php status: $config_status"
          if [ "$config_status" = "200" ]; then
            echo "::error::api/config.local.php is publicly readable (200) — secrets are exposed"
            exit 1
          fi

          echo "Deploy verified: server matches $GITHUB_SHA"

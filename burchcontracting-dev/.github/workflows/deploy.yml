name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: burchcontracting-dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: burchcontracting-dev/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          # FTP action resolves paths from repo root, not working-directory
          local-dir: ./burchcontracting-dev/dist/
          # Hostinger document root — update per staging domain:
          # nicheprohub.com (dev): ./public_html/
          # dev.burchcontracting.com: ./domains/dev.burchcontracting.com/public_html/
          server-dir: ./public_html/
          dangerous-clean-slate: false